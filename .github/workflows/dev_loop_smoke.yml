name: dev_loop smoke

on:
  pull_request:
    paths:
      - "dev_loop/**"
      - ".github/workflows/dev_loop_smoke.yml"
  push:
    branches:
      - main
    paths:
      - "dev_loop/**"
      - ".github/workflows/dev_loop_smoke.yml"

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Set up Node (for ajv-cli)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install bats + shellcheck + jq
        run: |
          sudo apt-get update -y
          sudo apt-get install -y bats shellcheck jq

      - name: Install mikefarah/yq v4.44.3
        run: |
          set -eu
          YQ_VER=v4.44.3
          YQ_SHA=a2c097180dd884a8d50c956ee16a9cec070f30a7947cf4ebf87d5f36213e9ed7
          curl -fsSL -o /tmp/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VER}/yq_linux_amd64"
          echo "${YQ_SHA}  /tmp/yq" | sha256sum -c -
          sudo mv /tmp/yq /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq
          yq --version 2>&1 | grep -qF 'github.com/mikefarah/yq' || { echo "wrong yq variant"; exit 1; }

      - name: Install ajv-cli
        run: sudo npm install -g ajv-cli@5

      # Pin tracker/dippin to known-good tags so CI failures reflect changes
      # in THIS repo, not upstream toolchain drift. Both pins were verified
      # locally against this PR's gates. Bump intentionally as a separate
      # change.
      - name: Install tracker + dippin (pinned, lockstep)
        env:
          # Lockstep pins: tracker v0.35.x vendors dippin v0.35.x (joint
          # release per dev_loop/README.md). The standalone dippin CLI MUST
          # match tracker's vendored version so `dippin check/doctor/simulate`
          # sees the same language semantics as `tracker validate`. There is
          # no dippin v0.35.1 tag; v0.35.0 is the matching release.
          TRACKER_VERSION: v0.35.1
          DIPPIN_VERSION: v0.35.0
        run: |
          go install "github.com/2389-research/tracker/cmd/tracker@${TRACKER_VERSION}"
          go install "github.com/2389-research/dippin-lang/cmd/dippin@${DIPPIN_VERSION}"
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Print toolchain versions
        run: |
          tracker version
          dippin version
          bats --version
          shellcheck --version | head -2
          # ajv-cli has no --version flag; print install path + first usage line
          # to confirm it is on PATH (avoids set -e tripping on usage exit code).
          command -v ajv && (ajv help validate 2>&1 || true) | head -2
          jq --version

      - name: dippin check
        run: dippin check dev_loop/dev_loop.dip

      - name: dippin doctor (target Grade A)
        run: |
          out=$(dippin doctor dev_loop/dev_loop.dip)
          echo "$out"
          grade=$(echo "$out" | sed -nE 's/.*Grade: ([A-F]).*/\1/p' | head -1)
          if [ "$grade" != "A" ]; then
            echo "::error::doctor grade $grade (expected A)"
            exit 1
          fi

      - name: dippin simulate (mandatory; catches validator B5 blind spot)
        run: dippin simulate dev_loop/dev_loop.dip > /tmp/simulate.jsonl

      - name: simulate post-check
        run: |
          # The last line of simulate output is a human-readable summary
          # (`path: Start → ...`); filter for the JSON events first.
          grep '^{' /tmp/simulate.jsonl | tail -1 \
            | jq -e '.event == "pipeline_end" and .status == "success"'

      - name: tracker validate
        run: tracker validate dev_loop/dev_loop.dip

      - name: shellcheck (sh dialect) on all scripts + tests
        run: |
          shellcheck --shell=sh dev_loop/scripts/*.sh
          shellcheck --shell=sh dev_loop/tests/test_marker_coverage.sh
          shellcheck --shell=sh dev_loop/tests/test_branch_model_ids.sh

      - name: Bootstrap identity gate
        run: sh dev_loop/tests/test_bootstrap_identical.sh

      - name: Repo-slug grep gate
        run: |
          set -eu
          # Allowed slug locations: YAML default + repo_conventions.md (operator template) + fixtures.
          hits=$(grep -rln '2389-research-pipelines\|2389-research/pipelines' dev_loop/ \
            | grep -v -E '^dev_loop/(config/dev_loop\.config\.yaml|config/repo_conventions\.md|tests/fixtures/)' || true)
          if [ -n "${hits}" ]; then
            printf 'Repo-slug leaked outside allowed locations:\n%s\n' "${hits}" >&2
            exit 1
          fi

      - name: ajv validate fixtures against schemas
        run: |
          AJV='ajv validate --strict=false'
          $AJV -s dev_loop/schemas/selected_issue.schema.json \
               -d dev_loop/tests/fixtures/selected_issue_sample.json
          # Positive coverage for the generalized URL regex (^[^/]+/[^/]+):
          # selected_issue must accept owner/name patterns beyond the upstream
          # 2389-research/pipelines repo.
          $AJV -s dev_loop/schemas/selected_issue.schema.json \
               -d dev_loop/tests/fixtures/selected_issue_generic_url.json
          $AJV -s dev_loop/schemas/plan.schema.json \
               -d dev_loop/tests/fixtures/plan_sample.json
          for f in dev_loop/tests/fixtures/verdict_pass.json \
                   dev_loop/tests/fixtures/verdict_block.json \
                   dev_loop/tests/fixtures/verdict_attest_valid.json; do
            $AJV -s dev_loop/schemas/verdict.schema.json -d "$f"
          done
          if $AJV -s dev_loop/schemas/verdict.schema.json \
                  -d dev_loop/tests/fixtures/verdict_attest_invalid.json 2>/dev/null; then
            echo "::error::verdict_attest_invalid.json should not validate"
            exit 1
          fi
          for f in dev_loop/tests/fixtures/synthesis_approved.json \
                   dev_loop/tests/fixtures/synthesis_changes_requested.json; do
            $AJV -s dev_loop/schemas/synthesis.schema.json -d "$f"
          done

      - name: bats unit tests
        run: bats dev_loop/tests/*.bats

      - name: marker coverage (regex <-> literal bijection)
        run: ./dev_loop/tests/test_marker_coverage.sh

      - name: branch model-ID allowlist
        run: ./dev_loop/tests/test_branch_model_ids.sh

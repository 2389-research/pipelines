name: changelog check

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  changelog:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce CHANGELOG update for behavioral PRs
        env:
          BASE_REF: ${{ github.base_ref }}
          SKIP_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'skip-changelog') }}
        run: |
          set -eu
          git fetch --no-tags --depth=0 origin "${BASE_REF}" >/dev/null 2>&1 || \
            git fetch --no-tags origin "${BASE_REF}"
          files=$(git diff --name-only "origin/${BASE_REF}...HEAD")
          echo "Changed files:"
          printf '  %s\n' ${files:-(none)}

          behavioral=$(printf '%s\n' "$files" | grep -E '(\.dip$|^dev_loop/)' || true)
          changelog=$(printf '%s\n' "$files" | grep -Fx 'CHANGELOG.md' || true)

          if [ -z "$behavioral" ]; then
            echo "::notice::No behavioral files (*.dip, dev_loop/) touched — CHANGELOG update not required."
            exit 0
          fi

          echo "Behavioral files touched:"
          printf '  %s\n' $behavioral

          if [ -n "$changelog" ]; then
            echo "::notice::CHANGELOG.md updated alongside behavioral changes."
            exit 0
          fi

          if [ "${SKIP_LABEL}" = "true" ]; then
            echo "::notice::skip-changelog label present — CHANGELOG update waived."
            exit 0
          fi

          {
            echo "::error::Behavioral files changed without a CHANGELOG.md update."
            echo "Touched the SemVer surface (see CONTRIBUTING.md#versioning):"
            printf '  %s\n' $behavioral
            echo "Either add an entry under [Unreleased] in CHANGELOG.md, or apply the 'skip-changelog' label if this PR legitimately needs no entry (CI/docs/infra-only)."
          } >&2
          exit 1

services:
  dev:
    image: golang:1.24
    working_dir: /workspace
    volumes:
      - .:/workspace
      - agent-data:/data
    environment:
      AGENT_DB_PATH: /data/agent.sqlite
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_HOST: http://host.docker.internal:11434
    command: ["sleep", "infinity"]

volumes:
  agent-data:

name: ci

on:
  push:
  pull_request:

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.60.3
          args: --version

      - name: Build
        run: go build ./cmd/agent/

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Lint
        run: golangci-lint run

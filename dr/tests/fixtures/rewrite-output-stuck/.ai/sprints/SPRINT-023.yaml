    - "db/migrations/007_waivers.*"
    - "db/migrations/008_orientation.*"
    - "src/sms/provider.*"
    - "src/services/qr_code.*"
    - "db/migrations/011_groups.*"
    - "src/ui/checkin/GroupCheckin.*"
    - "db/migrations/013_stations.*"
    - "src/services/registration_pipeline.*"
    - "src/services/auto_assignment.*"
    - "src/ui/staff/AssignmentBoard.*"
    - "src/ui/staff/RunOfShow.*"
    - "src/integrations/renxt/client.*"
    - "src/integrations/renxt/sync.*"
    - "src/api/skills_intake.*"
    - "src/api/court_snap.*"

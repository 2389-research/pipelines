id: "001"
title: "External Services & Dev Environment"
status: completed
bootstrap: true
complexity: low
depends_on: ["000"]
dependents: ["002", "023"]
stack:
  lang: javascript
  runner: npm
  test: jest
  lint: eslint
  build: make
  services: ["postgresql", "redis"]
scope_fence:
  off_limits:
    - "do not modify .ai/ledger.yaml"
    - "do not implement sprint 002 or later"
    - "do not add features beyond scope"
  touch_only: []
entry_preconditions:
  files_must_exist:
    - "package.json"
  sprints_must_be_complete: ["000"]
artifacts:
  creates:
    - path: "docker-compose.yml"
      type: config
    - path: "db/migrations/"
      type: migration
    - path: "src/db/connection.*"
      type: module
    - path: "src/health.*"
      type: module
    - path: ".env.example"
      type: config
  modifies: []
validation:
  commands:
    - cmd: "docker-compose up -d"
      expect: exit_0
    - cmd: "make test"
      expect: exit_0
    - cmd: "curl http://localhost:$PORT/health"
      expect: exit_0
dod:
  - "`docker-compose up -d` starts database service without errors"
  - "Database health check endpoint returns 200 with `{\"status\":\"healthy\"}`"
  - "Application code connects to the database and executes a trivial query (e.g., `SELECT 1`)"
  - "Migration tooling runs against the database without errors (empty migration)"
  - "`.env.example` documents all required environment variables with descriptions"
  - "`make test` still passes (no regressions from Sprint 000)"
history:

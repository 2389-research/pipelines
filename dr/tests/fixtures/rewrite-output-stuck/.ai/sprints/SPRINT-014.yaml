id: "014"
title: "Individual Volunteer End-to-End Flow"
status: planned
bootstrap: false
complexity: medium
depends_on: ["026", "007", "008", "009", "010", "026"]
dependents: ["022", "023"]
stack:
  lang: javascript
  runner: npm
  test: jest
  lint: eslint
  build: make
  services: []
scope_fence:
  off_limits:
    - "do not modify .ai/ledger.yaml"
    - "do not implement sprint 022 or later"
    - "do not add features beyond scope"
  touch_only: []
entry_preconditions:
  files_must_exist:
    - "src/services/conversation_engine.*"
    - "db/migrations/007_waivers.*"
    - "db/migrations/008_orientation.*"
    - "src/sms/provider.*"
    - "src/services/qr_code.*"
  sprints_must_be_complete: ["026", "007", "008", "009", "010"]
artifacts:
  creates:
    - path: "tests/e2e/individual_volunteer_flow.test.*"
      type: test
    - path: "src/services/registration_pipeline.*"
      type: module
  modifies: []
validation:
  commands:
    - cmd: "make test"
      expect: exit_0
    - cmd: "make e2e"
      expect: exit_0
dod:
  - "End-to-end test: anonymous user browses opportunities → selects shift → is prompted to authenticate → registers with name/phone/email → signs waiver → completes orientation → receives confirmation SMS → receives QR code"
  - "Returning volunteer path: recognized by phone → not asked to re-register → skips completed waiver → sees personalized suggestions"
  - "All flow steps render within the conversational UI framework"
  - "Flow gracefully handles partial completion (e.g., user drops off after registration, returns later to complete waiver)"
  - "`make test` and `make e2e` pass"
history:
  attempts: []
